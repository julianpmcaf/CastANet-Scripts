name: Build Script Docker Image

on:
  push:
    paths:
      - "scripts/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed script file
        id: meta
        run: |
          CHANGED_FILE=$(git diff --name-only HEAD~1 HEAD | grep '^scripts/' | grep -v '/$' | head -1)

          if [ -z "$CHANGED_FILE" ]; then
            echo "No script file changed, skipping build."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          SCRIPT_ID=$(echo "$CHANGED_FILE" | cut -d'/' -f2)
          FILENAME=$(echo "$CHANGED_FILE" | cut -d'/' -f3)
          EXTENSION="${FILENAME##*.}"

          echo "skip=false"           >> $GITHUB_OUTPUT
          echo "script_id=$SCRIPT_ID" >> $GITHUB_OUTPUT
          echo "filename=$FILENAME"   >> $GITHUB_OUTPUT
          echo "extension=$EXTENSION" >> $GITHUB_OUTPUT
          echo "changed_file=$CHANGED_FILE" >> $GITHUB_OUTPUT
          echo "image_name=${{ secrets.DOCKERHUB_USERNAME }}/script-$SCRIPT_ID" >> $GITHUB_OUTPUT
          echo "image_version=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        if: steps.meta.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        if: steps.meta.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare build context
        if: steps.meta.outputs.skip != 'true'
        run: |
          mkdir -p /tmp/docker_build

          if [ "${{ steps.meta.outputs.extension }}" = "zip" ]; then
            unzip "${{ steps.meta.outputs.changed_file }}" -d /tmp/docker_build/
            rm -rf /tmp/docker_build/__MACOSX
            ITEMS=$(ls /tmp/docker_build/ | wc -l)
            SUBDIR=$(ls /tmp/docker_build/ | head -1)
            if [ "$ITEMS" -eq 1 ] && [ -d "/tmp/docker_build/$SUBDIR" ]; then
              shopt -s dotglob
              mv /tmp/docker_build/$SUBDIR/* /tmp/docker_build/
              rm -rf "/tmp/docker_build/$SUBDIR"
            fi
            if [ ! -f /tmp/docker_build/Dockerfile ]; then 
            cat > /tmp/docker_build/Dockerfile << 'EOF' 
            FROM node:20-slim
            WORKDIR /app
            COPY . .
            RUN npm install --omit=dev
            CMD ["npm", "start"]
            EOF
            fi
          else
            cp "${{ steps.meta.outputs.changed_file }}" /tmp/docker_build/script.py
            cat > /tmp/docker_build/Dockerfile << 'EOF'
            FROM python:3.13-slim
            WORKDIR /app
            RUN pip install --no-cache-dir requests beautifulsoup4
            COPY script.py .
            CMD ["python", "script.py"]
            EOF
          fi

      - name: Build and push Docker image
        if: steps.meta.outputs.skip != 'true'
        id: build
        uses: docker/build-push-action@v5
        with:
          context: /tmp/docker_build
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_version }}
            ${{ steps.meta.outputs.image_name }}:latest

      - name: Notify backend - success
        if: steps.meta.outputs.skip != 'true' && success()
        run: |
          curl -s -X POST "${{ secrets.BACKEND_URL }}/scripts/${{ steps.meta.outputs.script_id }}/build-webhook" \
            -H "Content-Type: application/json" \
            -d "{
              \"build_status\": \"ready\",
              \"docker_image_name\": \"${{ steps.meta.outputs.image_name }}\",
              \"docker_image_version\": \"${{ steps.meta.outputs.image_version }}\"
            }"

      - name: Notify backend - failure
        if: steps.meta.outputs.skip != 'true' && failure()
        run: |
          curl -s -X POST "${{ secrets.BACKEND_URL }}/scripts/${{ steps.meta.outputs.script_id }}/build-webhook" \
            -H "Content-Type: application/json" \
            -d "{
              \"build_status\": \"failed\",
              \"error_message\": \"Docker build failed - check Actions logs for run ${{ github.run_number }}\"
            }"
